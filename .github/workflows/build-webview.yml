name: Build WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # Создаём папку для проекта во временной директории
          mkdir -p /tmp/myapp/app/src/main/assets/
          cp index.html /tmp/myapp/app/src/main/assets/
          cd /tmp/myapp
          
          # Создаём все необходимые файлы Android
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.myapp.messenger">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:usesCleartextTraffic="true" android:label="MyMessenger">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > app/src/main/java/com/myapp/messenger/MainActivity.java << 'EOF'
          package com.myapp.messenger;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # Создаём build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              defaultConfig { applicationId "com.myapp.messenger" minSdk 21 targetSdk 34 versionCode 1 versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          echo "include ':app'" > settings.gradle
          
          # Создаём пустой Gradle Wrapper (работает всегда без прав)
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          
          # Генерируем исполняемые файлы Wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
          printf '#!/bin/sh\nexec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          
          # Запускаем сборку
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-apk
          path: /tmp/myapp/app/build/outputs/apk/debug/*.apk
