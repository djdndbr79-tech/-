name: Build WebView APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # Создаём проект во временной папке
          cd /home/runner
          mkdir -p MyApp/app/src/main/assets
          mkdir -p MyApp/app/src/main/java/com/myapp/messenger
          mkdir -p MyApp/gradle/wrapper
          
          # Копируем ваш HTML
          cp $GITHUB_WORKSPACE/index.html MyApp/app/src/main/assets/
          
          # Переходим в проект
          cd MyApp
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.myapp.messenger">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application android:usesCleartextTraffic="true" android:label="Мой Мессенджер">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/myapp/messenger/MainActivity.java << 'EOF'
          package com.myapp.messenger;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # build.gradle (модуль)
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.myapp.messenger"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          # build.gradle (корневой)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Создаём gradlew через echo (без curl)
          echo '#!/bin/sh' > gradlew
          echo 'exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
          
          # Создаём заглушку gradle-wrapper.jar
          echo "dummy" > gradle/wrapper/gradle-wrapper.jar
          
          # Запускаем сборку (Gradle создаст корректный wrapper.jar сам)
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.0
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-apk
          path: /home/runner/MyApp/app/build/outputs/apk/debug/*.apk
